<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajmin Fayaz — UI/UX Portfolio</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --line: #d2d2d7;
            --ipad-silver: #c7c7c7;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 100px 20px;
        }
        h1 { font-size: 56px; letter-spacing: -1px; margin-bottom: 20px; }

        /* THE REALISTIC IPAD SETUP */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 50px 20px;
        }

        .project-block {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 50px;
            margin-bottom: 200px;
        }

        /* IPAD WITH BUTTONS & PORTS */
        .ipad-device {
            position: relative;
            width: 500px;
            perspective: 1500px;
            transition: 0.5s ease;
        }

        .ipad-body {
            background: #111;
            padding: 12px;
            border-radius: 40px;
            position: relative;
            border: 4px solid var(--ipad-silver);
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            transform: rotateY(-20deg) rotateX(5deg);
        }

        /* Side Buttons (Volume & Power) */
        .ipad-body::before {
            content: '';
            position: absolute;
            top: 60px; right: -7px;
            width: 3px; height: 50px;
            background: #888; border-radius: 0 4px 4px 0;
            box-shadow: 0 60px 0 #888; /* Second button */
        }
        
        /* Speaker Holes & Charging Port */
        .ipad-body::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 3px;
            background: #555; border-radius: 4px;
        }

        .screen {
            background: #fff;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen img { width: 100%; height: 100%; object-fit: cover; }

        /* MAGIC KEYBOARD (The Base) */
        .keyboard-base {
            position: absolute;
            bottom: -40px;
            left: -10%;
            width: 120%;
            height: 20px;
            background: #2c2c2e;
            border-radius: 10px 10px 40px 40px;
            transform: rotateX(70deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Trackpad detail */
        .keyboard-base::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30%; height: 60%;
            background: #3a3a3c;
            border-radius: 4px;
        }

        /* TEXT CONTENT */
        .info h3 { font-size: 32px; margin-bottom: 10px; }
        .info p { color: #6e6e73; font-size: 18px; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .project-block { flex-direction: column; text-align: center; }
            .ipad-device { width: 90%; transform: scale(0.8); }
            .ipad-body { transform: none; }
            .keyboard-base { display: none; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Ajmin Fayaz</h1>
        <p>Crafting high-fidelity digital products.</p>
    </section>

    <div class="container">
        
        <div class="project-block">
            <div class="ipad-device">
                <div class="ipad-body">
                    <div class="screen">
                        <img src="travel.jpg" alt="Travel Project">
                    </div>
                </div>
                <div class="keyboard-base"></div> </div>
            <div class="info">
                <h3>Unified Travel Experience</h3>
                <p>A seamless booking flow for modern explorers.</p>
            </div>
        </div>

        <div class="project-block" style="flex-direction: row-reverse;">
            <div class="ipad-device">
                <div class="ipad-body" style="transform: rotateY(20deg) rotateX(5deg);">
                    <div class="screen">
                        <img src="movie.jpg" alt="Cinema Project">
                    </div>
                </div>
                <div class="keyboard-base" style="left: -10%;"></div>
            </div>
            <div class="info">
                <h3>Cinema Booking</h3>
                <p>Real-time seat selection and summary panel.</p>
            </div>
        </div>

    </div>

</body>
</html>
