<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajmin Fayaz Portfolio</title>

<style>

:root{
--text:#111;
--muted:#6e6e73;
--line:#e5e5e7;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
}

body{
background:white;
color:var(--text);
}


/* NAV */

nav{

padding:20px 8vw;

border-bottom:1px solid var(--line);

display:flex;

justify-content:space-between;

}

a{
text-decoration:none;
color:black;
margin-left:30px;
}



/* HERO */

.hero{

padding:140px 8vw;

}

h1{

font-size:70px;

max-width:900px;

}

p{

margin-top:20px;

color:var(--muted);

font-size:18px;

max-width:600px;

}



/* WORK */

.section{

padding:120px 8vw;

border-top:1px solid var(--line);

}


.case{

display:grid;

grid-template-columns:1fr 1fr;

gap:80px;

align-items:center;

margin-bottom:120px;

}



/* REAL IPAD */

.device{

max-width:650px;

margin:auto;

}

.device img{

width:100%;

display:block;

}



/* TEXT */

h3{

font-size:34px;

}

.small{

margin-top:10px;

color:var(--muted);

}



/* MOBILE */

@media(max-width:900px){

.case{

grid-template-columns:1fr;

}

h1{

font-size:42px;

}

}

</style>

</head>



<body>



<nav>

Ajmin Fayaz

</div>

</nav>

</h1>

<p>

</p>

</div>

<div class="device">

<img src="ipad-travel.png">

</div>


<div>

<h3>

Unified Travel Experience

</h3>

<p class="small">

Transparent booking flow design.

</p>

</div>

</div>




<div class="case">


<div>

<h3>

</h3>

<p class="small">

</p>

</div>

</div>

</div>



</div>



</body>

</html>
