<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajmin Fayaz | UI/UX Designer Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0a0a0a; overflow-x: hidden; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "", size = 24 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Portfolio = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const projects = [
                {
                    title: "A Unified Travel Experience",
                    category: "Travel Booking Platform | 2026",
                    challenge: "Solving \"tab fatigue\" where users switch between multiple sites.",
                    solution: "A \"Visual-First\" approach using a unified navigation bar.",
                    feature: "A transparent booking flow that eliminates \"sticker shock\".",
                    image: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=1000",
                },
                {
                    title: "Lofio Real Estate",
                    category: "Premium Property Marketplace | 2026",
                    challenge: "Lack of trust in remote property investment.",
                    solution: "Focusing on virtual tours and verified agent interactions.",
                    feature: "Granular rating systems and Virtual Tour integration.",
                    image: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=1000",
                },
                {
                    title: "Upside The Cinematic Booking",
                    category: "Movie Ticketing Web App | 2025",
                    challenge: "Transactional, cluttered movie apps.",
                    solution: "A premium dark-mode interface mimicking the cinema.",
                    feature: "A persistent \"Anchor Summary\" panel for real-time pricing.",
                    image: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=1000",
                },
                {
                    title: "Lofio Real Estate",
                    category: "Premium Property Marketplace | 2026",
                    challenge: "Lack of trust in remote property investment.",
                    solution: "Focusing on virtual tours and verified agent interactions.",
                    feature: "Granular rating systems and Virtual Tour integration.",
                    image: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=1000",
                }
            ];

            const certificates = [
                { title: "Foundations of User Experience (UX) Design", issuer: "Google (via Coursera)" },
                { title: "Create and Design Digital Products using Canva", issuer: "Coursera Project Network" }
            ];

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-zinc-300 selection:bg-amber-500/30">
                    
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#0a0a0a]/90 backdrop-blur-md py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="text-xl font-bold text-white">AF<span className="text-amber-500">.</span></div>
                            <div className="hidden md:flex gap-8 text-sm font-medium">
                                <a href="#work" className="hover:text-amber-500">Work</a>
                                <a href="#certificates" className="hover:text-amber-500">Certificates</a>
                                <a href="#contact" className="hover:text-amber-500">Connect</a>
                            </div>
                            <a href="#contact" className="px-5 py-2 bg-white/10 hover:bg-white/20 text-white rounded-full text-sm">Let's Talk</a>
                        </div>
                    </nav>

                    <section className="relative w-full aspect-video min-h-[500px] flex items-center overflow-hidden">
    {/* Background Image & Overlays */}
    <div className="absolute inset-0 z-0">
        <img 
            src="./hero.jpg" 
            className="w-full h-full object-cover object-center opacity-50" 
        />
        <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0a] via-[#0a0a0a]/80 to-transparent"></div>
        <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
    </div>

    {/* Hero Content */}
    <div className="max-w-7xl mx-auto px-6 md:px-12 relative z-20 w-full">
        <div className="max-w-2xl">
            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-500 text-sm mb-4">
                <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                Open to Relocation (UAE)
            </div>
            
            <h5 className="text-5xl md:text-7xl font-bold text-white amal s hameed</h5>
            <h6 className="text-xl md:text-2xl text-zinc-400 font-light mb-6">
                 <span className="text-white font-medium">UI/UX Designer</span> .
            </h6>
            
            <a href="#work" className="px-8 py-3.5 bg-amber-600 hover:bg-amber-500 text-white rounded-full font-medium transition-all inline-flex items-center gap-2">
                View My Work <Icon name="arrow-right" size={16} />
            </a>
        </div>
    </div>
</section>


                    <section id="work" className="py-32 px-6 max-w-7xl mx-auto">
                        <h2 className="text-4xl font-bold text-white mb-20">Selected Work</h2>
                        <div className="space-y-32">
                            {projects.map((project, index) => (
                                <div key={index} className={`flex flex-col md:flex-row gap-12 items-center ${index % 2 !== 0 ? 'md:flex-row-reverse' : ''}`}>
                                    <div className="w-full md:w-1/2 group overflow-hidden rounded-2xl">
                                        <img src={project.image} className="w-full aspect-video object-cover transition-transform duration-700 group-hover:scale-110" />
                                    </div>
                                    <div className="w-full md:w-1/2">
                                        <div className="text-amber-500 text-sm font-bold uppercase mb-2">{project.category}</div>
                                        <h3 className="text-3xl font-bold text-white mb-6">{project.title}</h3>
                                        <p className="text-zinc-400 mb-6">{project.challenge}</p>
                                        <div className="p-4 bg-white/5 border-l-4 border-amber-500 rounded-r-xl">
                                            <div className="flex items-center gap-2 text-white font-bold mb-1">
                                                <Icon name="award" size={16} className="text-amber-500" /> Key Feature
                                            </div>
                                            <p className="text-sm">{project.feature}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section id="certificates" className="py-24 bg-zinc-900/30">
                        <div className="max-w-7xl mx-auto px-6">
                            <h2 className="text-3xl font-bold text-white mb-12 text-center">Certifications</h2>
                            <div className="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                                {certificates.map((cert, i) => (
                                    <div key={i} className="p-6 rounded-xl bg-zinc-900 border border-white/5 flex gap-4">
                                        <Icon name="award" className="text-amber-500" />
                                        <div>
                                            <h4 className="text-white font-bold">{cert.title}</h4>
                                            <p className="text-sm text-zinc-500">{cert.issuer}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer id="contact" className="py-32 border-t border-white/5">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <h2 className="text-5xl font-bold text-white mb-8">Let's Talk.</h2>
                            <a href="mailto:fayazajmin@gmail.com" className="text-2xl text-amber-500 hover:text-amber-400 underline transition-colors">
                                fayazajmin@gmail.com
                            </a>
                            <div className="flex justify-center gap-6 mt-12">
                                <a href="https://linkedin.com/in/ajmin-fayaz" className="hover:text-white"><Icon name="linkedin" /></a>
                                <a href="tel:+918089449893" className="hover:text-white"><Icon name="phone" /></a>
                            </div>
                            <p className="mt-20 text-zinc-600 text-sm">© 2026 amal s hammed</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
