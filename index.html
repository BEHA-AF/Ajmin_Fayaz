<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ajmin Fayaz</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont;
}

body{
background:white;
color:#111;
}



/* NAV */

nav{

padding:20px 8vw;

display:flex;

justify-content:space-between;

border-bottom:1px solid #eee;

}



/* HERO */

.hero{

padding:140px 8vw;

}

h1{

font-size:70px;

max-width:900px;

}

p{

margin-top:20px;

color:#666;

}



/* CASE */

.section{

padding:120px 8vw;

border-top:1px solid #eee;

}

.case{

display:grid;

grid-template-columns:1fr 1fr;

gap:80px;

align-items:center;

margin-bottom:140px;

}



/* REALISTIC IPAD */

.ipad{

width:600px;

margin:auto;

position:relative;

transform:

perspective(2000px)

rotateY(-25deg)

rotateX(10deg);

}


/* frame */

.ipad-frame{

background:black;

border-radius:30px;

padding:14px;

box-shadow:

0 80px 100px rgba(0,0,0,0.25);

}


/* screen */

.screen{

border-radius:20px;

overflow:hidden;

background:white;

}

.screen img{

width:100%;

display:block;

}



/* TEXT */

h3{

font-size:32px;

}

.small{

margin-top:10px;

color:#777;

}



/* MOBILE */

@media(max-width:900px){

.case{

grid-template-columns:1fr;

}

.ipad{

transform:none;

width:100%;

}

h1{

font-size:42px;

}

}

</style>

</head>



<body>



<nav>

</p>

</div>

</div>

</div>


<div>

<h3>

</h3>

<p class="small">

Transparent booking flow.

</div>

</div>





<div class="case">

<p class="small">

</div>

</div>

</div>

</div>


</div>



</div>



</body>

</html>
