<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajmin Fayaz | Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; margin: 0; }
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { animation: marquee 20s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to map Lucide names to components
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const Portfolio = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const projects = [
                {
                    title: "A Unified Travel Experience",
                    category: "Travel Booking Platform | 2026",
                    challenge: "Solving \"tab fatigue\" where users switch between multiple sites.",
                    solution: "A \"Visual-First\" approach with a unified navigation bar.",
                    feature: "A transparent booking flow that eliminates \"sticker shock\".",
                    image: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=1000",
                    accent: "from-blue-500/20 to-cyan-500/20"
                },
                {
                    title: "Lofio Real Estate",
                    category: "Premium Property Marketplace | 2026",
                    challenge: "Lack of trust in remote property investment.",
                    solution: "High-trust platform focusing on virtual tours and verified agents.",
                    feature: "Granular rating systems and Virtual Tour integration.",
                    image: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=1000",
                    accent: "from-emerald-500/20 to-teal-500/20"
                }
            ];

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-zinc-300">
                    {/* Navbar */}
                    <nav className={`fixed w-full z-50 transition-all ${scrolled ? 'bg-[#0a0a0a]/90 backdrop-blur-md py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="text-xl font-bold text-white">AF<span className="text-amber-500">.</span></div>
                            <div className="flex gap-6 items-center">
                                <a href="#work" className="hover:text-amber-500 text-sm">Work</a>
                                <button className="px-5 py-2 bg-white/10 hover:bg-white/20 text-white rounded-full text-sm">Let's Talk</button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="relative h-screen flex items-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            {/* Make sure this image is in your GitHub Repo! */}
                            <img src="505489970_18067861196292786_20203999165502993578_n.jpg" className="w-full h-full object-cover opacity-40" />
                            <div className="absolute inset-0 bg-gradient-to-r from-[#0a0a0a] via-[#0a0a0a]/60 to-transparent"></div>
                        </div>
                        <div className="relative z-10 px-12 max-w-3xl">
                            <h1 className="text-6xl font-bold text-white mb-4">Ajmin Fayaz</h1>
                            <p className="text-2xl text-zinc-400 mb-8">Strategic UI/UX Designer bridging luxury & digital.</p>
                            <a href="#work" className="px-8 py-4 bg-amber-600 rounded-full text-white font-medium">Explore Work</a>
                        </div>
                    </section>

                    {/* Work Section */}
                    <section id="work" className="py-24 px-6 max-w-7xl mx-auto">
                        <h2 className="text-4xl font-bold text-white mb-16">Selected Projects</h2>
                        <div className="grid gap-20">
                            {projects.map((p, i) => (
                                <div key={i} className="flex flex-col md:flex-row gap-12 items-center">
                                    <img src={p.image} className="w-full md:w-1/2 rounded-2xl grayscale hover:grayscale-0 transition-all duration-500" />
                                    <div className="w-full md:w-1/2">
                                        <span className="text-amber-500 font-bold text-sm tracking-widest">{p.category}</span>
                                        <h3 className="text-3xl font-bold text-white mt-2 mb-6">{p.title}</h3>
                                        <p className="text-zinc-400 mb-4">{p.challenge}</p>
                                        <div className="flex items-center gap-2 text-white font-bold">
                                            <LucideIcon name="award" size={18} className="text-amber-500" /> Key Feature: {p.feature}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 border-t border-white/5 text-center">
                        <div className="flex justify-center gap-8 mb-8">
                            <a href="mailto:fayazajmin@gmail.com"><LucideIcon name="mail" className="hover:text-amber-500" /></a>
                            <a href="#"><LucideIcon name="linkedin" className="hover:text-amber-500" /></a>
                        </div>
                        <p className="text-zinc-600">© 2026 Ajmin Fayaz</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
